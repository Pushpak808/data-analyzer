<script>

const COLORS=[
"#2563eb","#16a34a","#dc2626",
"#ca8a04","#7c3aed","#0891b2",
"#be185d","#111827"
]

let G={}
let chartInstances=[]

document.getElementById("drop-zone").onclick=()=>{
document.getElementById("file-input").click()
}

document.getElementById("file-input").onchange=e=>{
upload(e.target.files[0])
}

function show(s){
document.getElementById("upload-section").style.display =
s==="upload"?"block":"none"

document.getElementById("loading").style.display =
s==="loading"?"block":"none"

document.getElementById("dashboard").style.display =
s==="dashboard"?"block":"none"
}

async function upload(file){
try{

show("loading")

const form=new FormData()
form.append("file",file)

const res=await fetch("/upload",{
method:"POST",
body:form
})

if(!res.ok){
show("upload")
alert("Upload failed")
return
}

G=await res.json()

renderSidebar()
renderCharts()

show("dashboard")

}catch(e){
console.error(e)
show("upload")
alert("Upload error")
}
}

function renderSidebar(){
const imp=G.column_importance
const el=document.getElementById("col-list")

el.innerHTML=G.columns.map(c=>{
const info=imp[c]
return `
<div class="col-item">
<div>${c}</div>
<div class="badge-${info.label}">
${info.label}
</div>
</div>`
}).join("")
}

function renderCharts(){

chartInstances.forEach(c=>c.destroy())
chartInstances=[]

const grid=document.getElementById("charts-grid")
grid.innerHTML=""

const charts=Object.entries(G.charts)
const order={high:0,medium:1,low:2}

charts.sort((a,b)=>
(order[a[1].priority||"medium"]-
order[b[1].priority||"medium"])
)

charts.forEach(([key,chart])=>{

if(chart.type==="correlation_matrix"){
renderCorr(chart)
return
}

if(chart.type==="missing_heatmap"){
renderMissing(chart)
return
}

if(chart.type==="boxplot"){
renderBox(chart)
return
}

const card=makeCard(chart.title,chart.priority)
grid.appendChild(card)

const canvas=card.querySelector("canvas")

if(chart.type==="scatter"){

const pts=chart.x.map((x,i)=>({x,y:chart.y[i]}))

chartInstances.push(new Chart(canvas,{
type:"scatter",
data:{datasets:[{data:pts,backgroundColor:"#2563eb"}]},
options:{responsive:true,maintainAspectRatio:false}
}))

return
}

const type=chart.type==="histogram"?"bar":chart.type

chartInstances.push(new Chart(canvas,{
type,
data:{
labels:chart.labels,
datasets:[{
data:chart.values,
backgroundColor:COLORS.slice(0,chart.values.length)
}]
},
options:{responsive:true,maintainAspectRatio:false}
}))

})
}

function makeCard(title,priority){

const badge=priority?
`<span class="chart-badge badge-${priority}">
${priority}
</span>`:""

const div=document.createElement("div")
div.className="chart-card"

div.innerHTML=`
<div class="chart-title">
${title}
${badge}
</div>
<div class="chart-wrap">
<canvas></canvas>
</div>
`

return div
}

function renderCorr(chart){

const grid=document.getElementById("charts-grid")

const div=document.createElement("div")
div.className="chart-card"

let html="<table>"

chart.matrix.forEach(row=>{
html+="<tr>"
row.forEach(v=>{
const c=Math.abs(v)*255
html+=`<td style="background:rgb(255,${255-c},${255-c})">${v}</td>`
})
html+="</tr>"
})

html+="</table>"

div.innerHTML=`
<div class="chart-title">${chart.title}</div>
${html}
`

grid.appendChild(div)
}

function renderMissing(chart){

const grid=document.getElementById("charts-grid")

const div=document.createElement("div")
div.className="chart-card"

div.innerHTML=`
<div class="chart-title">Missing Values</div>
<div class="chart-wrap">
<canvas></canvas>
</div>
`

grid.appendChild(div)

const canvas=div.querySelector("canvas")

const cols=chart.columns
const rows=chart.rows

const missing=cols.map((_,i)=>{
let m=0
rows.forEach(r=>{ if(r[i]) m++ })
return (m/rows.length)*100
})

new Chart(canvas,{
type:"bar",
data:{
labels:cols,
datasets:[{
label:"Missing %",
data:missing,
backgroundColor:"#ef4444"
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{beginAtZero:true}
}
}
})
}

function renderBox(chart){

const grid=document.getElementById("charts-grid")

const div=document.createElement("div")
div.className="chart-card"

div.innerHTML=`
<div class="chart-title">${chart.title}</div>
<div class="chart-wrap">
<canvas></canvas>
</div>
`

grid.appendChild(div)

const canvas=div.querySelector("canvas")
const ctx=canvas.getContext("2d")

const groups=Object.entries(chart.groups)

const height=240
const width=380

canvas.height=height
canvas.width=width

const padding=40
const rowHeight=(height-padding)/groups.length

let min=Infinity
let max=-Infinity

groups.forEach(([_,g])=>{
if(g.insufficient_data) return
min=Math.min(min,g.min)
max=Math.max(max,g.max)
})

function scale(v){
return padding+(v-min)/(max-min)*(width-padding-20)
}

groups.forEach(([name,g],i)=>{

if(g.insufficient_data) return

const y=padding/2+i*rowHeight

const xMin=scale(g.min)
const xQ1=scale(g.q1)
const xMed=scale(g.median)
const xQ3=scale(g.q3)
const xMax=scale(g.max)

ctx.strokeStyle="#999"
ctx.beginPath()
ctx.moveTo(xMin,y)
ctx.lineTo(xMax,y)
ctx.stroke()

ctx.fillStyle="#3b82f6"
ctx.fillRect(xQ1,y-6,xQ3-xQ1,12)

ctx.strokeStyle="#000"
ctx.beginPath()
ctx.moveTo(xMed,y-8)
ctx.lineTo(xMed,y+8)
ctx.stroke()

ctx.fillStyle="#000"
ctx.font="10px sans-serif"
ctx.fillText(name,5,y+3)

})
}

</script>
